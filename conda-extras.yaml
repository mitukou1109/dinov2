name: dinov2-extras
channels:
  - defaults
  - pytorch
  - nvidia/label/cuda-12.1.0
  - xformers
  - conda-forge
dependencies:
  - python
  - pytorch::pytorch
  - pytorch::pytorch-cuda=12.1.0
  - pytorch::torchvision
  - omegaconf
  - torchmetrics
  - fvcore
  - iopath
  - xformers::xformers
  - pip
  - pip:
    - git+https://github.com/facebookincubator/submitit
    - --extra-index-url https://pypi.nvidia.com
    - cuml-cu12
    - mmcv-full
    - mmsegmentation
